name: publish package

on:
  push:
    branches:
      - master

jobs:
  build:
    name: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.8.3"

      - name: install poetry
        uses: Gr1N/setup-poetry@v7

      - name: Set SPEC_VERSION env var
        run: echo ::set-env name=SPEC_VERSION::"v$(date -u --iso-8601=minutes | cut
          -c-16 | sed -e 's/[ :T\+\-]/./g')"
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: true

      - name: install
        run: |
          make install

      - name: build whl
        run: |
          make dist

      - name: create release
        id: create_release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
        continue-on-error: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.SPEC_VERSION }}
          release_name: ${{ env.SPEC_VERSION }}

      - name: upload whl
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: splunk-packaging-toolkit-1.0.1/dist/splunk_packaging_toolkit-1.0.1-py3-none-any.whl
          asset_name: splunk_packaging_toolkit-1.0.1-py3-none-any.whl
          asset_content_type: application/x-wheel+zip
